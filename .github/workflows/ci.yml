name: ERP CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: erp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API unit tests
        run: pnpm --filter api run test:ci

      - name: Build API
        run: pnpm --filter api run build

      - name: Build web application
        env:
          NEXT_PUBLIC_API_URL: https://amdox-erp-api.onrender.com
        run: pnpm --filter web run build

              - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/ml-service/requirements.txt

      - name: Install ML dependencies
        working-directory: apps/ml-service
        run: pip install -r requirements.txt

      - name: Test ML forecasting service
        working-directory: apps/ml-service
        run: pytest -q